# .gitlab-ci.yml

stages:
  - deploy

pages:
  stage: deploy
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      - public
  only:
    - main

deploy_to_github:
  stage: deploy
  image: node:20-alpine
  needs: ["pages"]
  before_script:
    - apk add --no-cache git
    - git config --global user.email "mostaphaoulahyan@example.com"
    - git config --global user.name "Mostafa10Oulahyan"
  script:
    - echo "Starting mirroring process to GitHub..."
    - npm ci
    - npm run build
    - git clone --branch main https://oauth2:${GITHUB_TOKEN}@github.com//Mostafa10Oulahyan/Mostafa10Oulahyan.git repo-gh
    - rm -rf repo-gh/*
    - cp -r dist/* repo-gh/
    - cd repo-gh
    - git add .
    - git commit -m "Deployment via GitLab CI/CD" || echo "No changes to commit"
    - git push origin main
    - echo "Successfully mirrored and deployed to GitHub Pages!"
  only:
    - main
  except:
    - merge_requests